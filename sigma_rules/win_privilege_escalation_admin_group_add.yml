title: User Added to Local Administrators or Domain Admins Group
id: f7d6e5a4-b8c9-0123-def0-123456789013
status: stable
description: >
  Detects membership changes to privileged groups. EventID 4728 covers
  domain-level global security groups; EventID 4732 covers local security groups.
  Attackers add accounts post-compromise to ensure persistent privileged access.
references:
  - https://attack.mitre.org/techniques/T1098/001/
author: HUNTER SOC
date: 2026-04-22
tags:
  - attack.persistence
  - attack.privilege_escalation
  - attack.t1098.001
logsource:
  product: windows
  service: security
detection:
  selection_events:
    winlog.event_id:
      - '4728'
      - '4732'
      - '4756'
  selection_groups:
    winlog.event_data.GroupName|contains:
      - 'Administrators'
      - 'Domain Admins'
      - 'Enterprise Admins'
      - 'Schema Admins'
  condition: selection_events and selection_groups
falsepositives:
  - Legitimate IT admin provisioning
  - Automated account management by directory sync tools
level: high
