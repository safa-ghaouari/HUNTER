title: LSASS Memory Handle Requested — Credential Dumping
id: a8e7f6b5-c9d0-1234-ef01-234567890124
status: stable
description: >
  Detects a handle request to the LSASS process (EventID 4656 / ObjectName ending
  with lsass.exe). This is a direct indicator of in-memory credential harvesting
  used by Mimikatz, ProcDump, Task Manager dump, and similar tools.
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://github.com/gentilkiwi/mimikatz
author: HUNTER SOC
date: 2026-04-22
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  product: windows
  service: security
detection:
  selection:
    winlog.event_id:
      - '4656'
      - '4663'
    winlog.event_data.ObjectName|endswith: '\lsass.exe'
    winlog.event_data.ObjectType: 'Process'
  condition: selection
falsepositives:
  - EDR/AV products legitimately reading LSASS for memory protection
  - Windows Defender Credential Guard operations
level: critical
