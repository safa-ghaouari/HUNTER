SecRule REQUEST_URI|ARGS|REQUEST_BODY "@rx (?i)(?:\.\./|%2e%2e%2f|%252e%252e%252f)" \
    "id:100100,phase:2,deny,status:403,log,msg:'Path traversal pattern detected'"

SecRule REQUEST_URI|ARGS|REQUEST_BODY "@rx (?i)(?:<script\b|javascript:|onerror\s*=|onload\s*=|alert\s*\()" \
    "id:100101,phase:2,deny,status:403,log,msg:'Potential XSS payload detected'"

SecRule REQUEST_URI|ARGS|REQUEST_BODY "@rx (?i)(?:union(?:\s+all)?\s+select|select\s+.+\s+from|drop\s+table|insert\s+into|information_schema|sleep\s*\(|benchmark\s*\()" \
    "id:100102,phase:2,deny,status:403,log,msg:'Potential SQL injection payload detected'"
