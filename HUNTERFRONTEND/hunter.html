<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUNTER — Threat Intelligence Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root,[data-theme="dark"]{
  --bg0:#010914;--bg1:#040f1e;--bg2:#071628;--bg3:#0c1f33;--bg4:#122640;
  --bghov:rgba(77,140,255,0.05);
  --b1:rgba(40,100,180,0.15);--b2:rgba(40,100,180,0.25);--b3:rgba(40,100,180,0.38);
  --bacc:rgba(13,186,181,0.32);
  --teal:#0dbab5;--tealb:#22d5d0;--tealglow:rgba(13,186,181,0.16);--tealbg:rgba(13,186,181,0.09);
  --ice:#4da8ff;--icebg:rgba(77,168,255,0.11);
  --amber:#f4a20e;--amberbg:rgba(244,162,14,0.12);
  --red:#f04565;--redbg:rgba(240,69,101,0.13);
  --green:#12c492;--greenbg:rgba(18,196,146,0.12);
  --purple:#a78bfa;--purplebg:rgba(167,139,250,0.12);
  --t1:#b8d4f0;--t2:#4a7aaa;--t3:#1e3d5c;--t4:#0d2038;
  --tmono:#5bb8ff;--tmonoalt:#4fc3f7;
  color-scheme:dark;
}
[data-theme="light"]{
  --bg0:#eef1f6;--bg1:#f5f7fa;--bg2:#ffffff;--bg3:#ffffff;--bg4:#e6ecf3;
  --bghov:rgba(10,158,154,0.05);
  --b1:rgba(0,0,0,0.07);--b2:rgba(0,0,0,0.11);--b3:rgba(0,0,0,0.18);
  --bacc:rgba(10,158,154,0.28);
  --teal:#0a9e9a;--tealb:#0dbab5;--tealglow:rgba(10,158,154,0.12);--tealbg:rgba(10,158,154,0.08);
  --ice:#1a6fd4;--icebg:rgba(26,111,212,0.08);
  --amber:#b8720a;--amberbg:rgba(184,114,10,0.09);
  --red:#c8283e;--redbg:rgba(200,40,62,0.08);
  --green:#0b9464;--greenbg:rgba(11,148,100,0.09);
  --purple:#6148b8;--purplebg:rgba(97,72,184,0.09);
  --t1:#0f1e2d;--t2:#3d5870;--t3:#8aa2b8;--t4:#c0d0de;
  --tmono:#164e72;--tmonoalt:#106878;
  color-scheme:light;
}

html,body{height:100%;font-family:'IBM Plex Sans',system-ui,sans-serif;font-size:13.5px;background:var(--bg0);color:var(--t1);-webkit-font-smoothing:antialiased;line-height:1.55}
#root{height:100%;display:flex;flex-direction:column}
h1,h2,h3,h4,h5{font-family:'Space Grotesk',system-ui,sans-serif;line-height:1.2;font-weight:600}
code,.mono{font-family:'IBM Plex Mono','Courier New',monospace}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}
[data-theme="light"] ::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15)}
button{cursor:pointer;font-family:'IBM Plex Sans',system-ui,sans-serif;border:none;outline:none}
input,select,textarea{font-family:'IBM Plex Sans',system-ui,sans-serif;outline:none;color:var(--t1)}
a{color:inherit;text-decoration:none}
::selection{background:rgba(13,186,181,0.22)}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInR{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
@keyframes spinAnim{to{transform:rotate(360deg)}}
@keyframes pulseAnim{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes pingRing{0%{transform:scale(1);opacity:.7}100%{transform:scale(3);opacity:0}}
@keyframes dashFlow{to{stroke-dashoffset:-20}}
@keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

.fadeUp{animation:fadeUp .3s ease forwards}
.slideInR{animation:slideInR .22s ease forwards}
.spin{animation:spinAnim .85s linear infinite}
.pulse{animation:pulseAnim 2s ease infinite}
</style>
</head>
<body>
<div id="root"></div>
<script>
  // Apply persisted theme before React hydrates to avoid flash
  (function(){
    var t = localStorage.getItem('hunter-theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
  })();</script>
<script src="src/api.js"></script>
<script type="text/babel" src="src/ui.jsx"></script>
<script type="text/babel" src="src/shell.jsx"></script>
<script type="text/babel" src="src/login.jsx"></script>
<script type="text/babel" src="src/admin1.jsx"></script>
<script type="text/babel" src="src/admin2.jsx"></script>
<script type="text/babel" src="src/admin3.jsx"></script>
<script type="text/babel" src="src/client.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
